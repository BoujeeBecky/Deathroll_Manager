name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive dalamud.zip dalamud
          "DALAMUD_HOME=$pwd\dalamud" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        run: dotnet build -c Release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/DeathrollManager/latest.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
