name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive dalamud.zip dalamud
          "DALAMUD_HOME=$pwd\dalamud" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        run: dotnet build -c Release

      # Release title = first line of RELEASE_NOTES.md (leading "# " stripped);
      # the file body becomes the release notes.
      - name: Read release title
        shell: pwsh
        run: |
          $title = ((Get-Content RELEASE_NOTES.md -TotalCount 1) -replace '^#\s*','').Trim()
          "RELEASE_TITLE=$title" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} — ${{ env.RELEASE_TITLE }}
          body_path: RELEASE_NOTES.md
          files: bin/Release/DeathrollManager/latest.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
